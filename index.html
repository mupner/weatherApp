<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App here</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1
        style="
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 8px;
          justify-content: center;
        "
      >
        <img
          src="https://openweathermap.org/payload/api/media/file/02d.png"
          alt="Weather-icon"
        />
        <p>Weather App</p>
      </h1>

      <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter a city..." />
        <button id="search-btn">Search</button>
      </div>

      <div class="weather-result" id="weather-result"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
